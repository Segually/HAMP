name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: HAMP-amd64
          - target: aarch64-unknown-linux-gnu
            artifact: HAMP-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (ARM64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/HAMP ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Update unstable release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Force-update unstable tag
        run: |
          git tag -f unstable
          git push origin unstable --force

      - name: Create/update unstable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unstable
          name: Unstable
          prerelease: true
          make_latest: false
          body: "Latest build from master — ${{ github.sha }}"
          files: |
            HAMP-amd64/HAMP-amd64
            HAMP-arm64/HAMP-arm64
